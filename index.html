<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyD4TfY6Iwrju_aaG1vpN-q1Z9LyiDBeQvQ",
 authDomain:"estoque-app-13f1d.firebaseapp.com",
 projectId:"estoque-app-13f1d"
});

const db=getFirestore(app);

let produtos=[];

window.logar=function(){
 if(document.getElementById("senha").value==="161004"){
   document.getElementById("login").style.display="none";
   document.getElementById("app").style.display="block";
   carregar();
 } else alert("Senha errada");
}

window.trocarTab=function(tab){
 document.getElementById("add").style.display="none";
 document.getElementById("lista").style.display="none";

 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo'));

 if(tab==="add"){
   document.getElementById("add").style.display="block";
   document.querySelectorAll('.tab')[0].classList.add('ativo');
 }else{
   document.getElementById("lista").style.display="block";
   document.querySelectorAll('.tab')[1].classList.add('ativo');
 }
}

function base64(file){
 return new Promise(r=>{
 let reader=new FileReader();
 reader.onload=()=>r(reader.result);
 reader.readAsDataURL(file);
 });
}

function parseTam(str){
 let obj={};
 if(!str) return obj;

 str.split(',').forEach(p=>{
   let [t,q]=p.split(':');
   if(t && q) obj[t.trim()]={total:+q,vendido:0};
 });

 return obj;
}

window.addProduto=async()=>{
 if(!nome.value || !valor.value || !custo.value || !tamanhos.value){
   alert("Preencha tudo");
   return;
 }

 let file=foto.files[0];
 if(!file) return alert("Imagem obrigatória");

 let img=await base64(file);
 let tam=parseTam(tamanhos.value);

 let total=Object.values(tam).reduce((a,b)=>a+b.total,0);
 let custoTotal=(Number(custo.value)||0)*total;

 await addDoc(collection(db,"produtos"),{
   nome:nome.value,
   valor:Number(valor.value)||0,
   custo:custoTotal,
   tamanhos:tam,
   img
 });

 carregar();
}

window.editarProduto=async(id)=>{
 let p=produtos.find(x=>x.id===id);
 if(!p) return;

 let nomeN=prompt("Nome",p.nome);
 let valorN=prompt("Valor",p.valor);

 await updateDoc(doc(db,"produtos",id),{
   nome:nomeN,
   valor:+valorN
 });

 carregar();
}

window.excluirProduto=async(id)=>{
 if(!confirm("Excluir?")) return;
 await deleteDoc(doc(db,"produtos",id));
 carregar();
}

window.vender=async(id,tam)=>{
 let p=produtos.find(x=>x.id===id);
 if(!p) return;

 let t=p.tamanhos[tam];
 if(t.vendido>=t.total) return alert("Sem estoque");

 t.vendido++;

 await updateDoc(doc(db,"produtos",id),{
   tamanhos:p.tamanhos
 });

 carregar();
}

async function carregar(){
 let snap=await getDocs(collection(db,"produtos"));
 produtos=[];
 snap.forEach(d=>produtos.push({id:d.id,...d.data()}));
 render();
}

function render(){
 let container=document.getElementById("produtos");
 container.innerHTML="";

 let investido=0,estoque=0,vendidoTotal=0;

 produtos.forEach(p=>{
 let vendidosProduto=0;
 let estoqueProduto=0;
 let tHTML="";

 for(let t in p.tamanhos){
   let d=p.tamanhos[t];
   let rest=d.total-d.vendido;

   let valorUnit=Number(p.valor)||0;

   vendidosProduto+=d.vendido;
   vendidoTotal+=d.vendido*valorUnit;
   estoque+=rest*valorUnit;

   estoqueProduto+=rest;

   tHTML+=`
   <div>
     ${t}: ${rest}
     <button onclick="vender('${p.id}','${t}')">+</button>
   </div>`;
 }

 investido+=Number(p.custo)||0;

 if(estoqueProduto>0){
   container.innerHTML+=`
   <div class="card">
     <img src="${p.img}">
     <div class="info">
       <b>${p.nome}</b><br>
       R$ ${p.valor}<br>
       ${tHTML}
       <button onclick="editarProduto('${p.id}')">Editar</button>
       <button class="red" onclick="excluirProduto('${p.id}')">Excluir</button>
     </div>
   </div>`;
 }

 });

 document.getElementById("investido").innerText=investido.toFixed(2);
 document.getElementById("estoque").innerText=estoque.toFixed(2);
 document.getElementById("lucro").innerText=(vendidoTotal-investido).toFixed(2);
}
</script>
