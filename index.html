<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;padding:10px}
.container{max-width:900px;margin:auto}

input,textarea,select{
width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none
}

button{
padding:8px;margin:4px 0;border:none;border-radius:6px;
background:#22c55e;color:white;font-weight:bold;cursor:pointer
}

.red{background:#ef4444}
.blue{background:#3b82f6}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px
}

.grid-produtos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:10px;
}

.card{
background:#1e293b;
padding:10px;
border-radius:10px;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.tam{
display:flex;
justify-content:space-between;
align-items:center;
margin:3px 0;
}

.paginacao{
display:flex;
justify-content:space-between;
margin-top:10px;
}
</style>
</head>

<body>
<div class="container">

<div id="login">
<h2>Login</h2>
<input type="password" id="senha" placeholder="Digite a senha">
<button onclick="logar()">Entrar</button>
</div>

<div id="app" style="display:none">
<h2>Meu Estoque</h2>

<div class="grid">
<div class="card">Estoque: R$ <span id="totalEstoque">0</span></div>
<div class="card">Vendido: R$ <span id="totalVendido">0</span></div>
<div class="card">Investido: R$ <span id="totalInvestido">0</span></div>
<div class="card">Lucro: R$ <span id="lucro">0</span></div>
</div>

<input type="file" id="foto" accept="image/*">
<input type="text" id="nome" placeholder="Nome">
<textarea id="desc" placeholder="Descrição"></textarea>

<select id="categoria">
<option>Europeu</option>
<option>Seleções</option>
<option>Brasil</option>
<option>Outros</option>
</select>

<input type="number" id="valor" placeholder="Valor de venda">
<input type="number" id="custo" placeholder="Custo por peça">
<input type="text" id="tamanhos" placeholder="Ex: P:2,M:3,G:1">

<button onclick="addProduto()">Adicionar</button>

<select id="filtro" onchange="paginaAtual=1; render()">
<option value="Todos">Todos</option>
<option value="Europeu">Europeu</option>
<option value="Seleções">Seleções</option>
<option value="Brasil">Brasil</option>
<option value="Outros">Outros</option>
</select>

<div id="lista"></div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4TfY6Iwrju_aaG1vpN-q1Z9LyiDBeQvQ",
  authDomain: "estoque-app-13f1d.firebaseapp.com",
  projectId: "estoque-app-13f1d",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let produtos = [];
let paginaAtual = 1;
const itensPorPagina = 6;

window.logar = function(){
 const senha = document.getElementById('senha').value;

 if(senha === '161004'){
   document.getElementById('login').style.display='none';
   document.getElementById('app').style.display='block';
   carregar();
 }else{
   alert('Senha errada');
 }
}

async function carregar(){
 const querySnapshot = await getDocs(collection(db, "produtos"));
 produtos=[];
 querySnapshot.forEach((docu)=>{
 produtos.push({id:docu.id,...docu.data()});
 });
 render();
}

function converterBase64(file){
 return new Promise((resolve)=>{
 const reader = new FileReader();
 reader.readAsDataURL(file);
 reader.onload = ()=> resolve(reader.result);
 });
}

function parseTamanhos(str){
 let obj={};
 if(!str) return obj;

 str.split(',').forEach(par=>{
 let [tam,qtd]=par.split(':');
 if(tam && qtd){
   obj[tam.trim()]={total:Number(qtd),vendido:0};
 }
 });
 return obj;
}

window.addProduto = async function(){
 const file = document.getElementById('foto').files[0];
 const nome = document.getElementById('nome').value;
 const desc = document.getElementById('desc').value;
 const categoria = document.getElementById('categoria').value;
 const valor = Number(document.getElementById('valor').value);
 const custoUnitario = Number(document.getElementById('custo').value);
 const tamanhosStr = document.getElementById('tamanhos').value;

 if(!file || !nome || !valor || !tamanhosStr || !custoUnitario){
   return alert('Preencha tudo');
 }

 const base64 = await converterBase64(file);
 const tamanhos = parseTamanhos(tamanhosStr);

 let quantidadeTotal = Object.values(tamanhos).reduce((a,b)=>a+b.total,0);
 const custo = custoUnitario * quantidadeTotal;

 await addDoc(collection(db,"produtos"),{
 nome,desc,categoria,valor,custo,tamanhos,img:base64
 });

 carregar();
}

window.vender = async function(id,tam){
 let produto = produtos.find(p=>p.id===id);
 if(!produto || !produto.tamanhos || !produto.tamanhos[tam]) return;

 let tamanho = produto.tamanhos[tam];

 if(tamanho.vendido >= tamanho.total){
 alert('Sem estoque');
 return;
 }

 tamanho.vendido++;

 await updateDoc(doc(db,"produtos",id),{tamanhos:produto.tamanhos});
 carregar();
}

window.excluir = async function(id){
 await deleteDoc(doc(db,"produtos",id));
 carregar();
}

window.editarProduto = async function(id){
 let p = produtos.find(x=>x.id===id);
 if(!p) return;

 let novoNome = prompt("Nome", p.nome);
 let novaDesc = prompt("Descrição", p.desc);
 let novoValor = Number(prompt("Valor", p.valor));
 let novosTam = prompt("Tamanhos (P:2,M:3)", "P:2,M:3");

 let tamanhos = parseTamanhos(novosTam);

 await updateDoc(doc(db,"produtos",id),{
   nome: novoNome,
   desc: novaDesc,
   valor: novoValor,
   tamanhos: tamanhos
 });

 carregar();
}

window.proximaPagina = function(){
 paginaAtual++;
 render();
}

window.paginaAnterior = function(){
 if(paginaAtual > 1){
   paginaAtual--;
   render();
 }
}

function render(){
 let filtro = document.getElementById('filtro').value;
 let lista = document.getElementById('lista');
 lista.innerHTML='';

 let totalEstoque=0,totalVendido=0,totalInvestido=0;

 let filtrados = produtos.filter(p=>{
   return filtro === 'Todos' || p.categoria === filtro;
 });

 let inicio = (paginaAtual - 1) * itensPorPagina;
 let paginaItens = filtrados.slice(inicio,inicio+itensPorPagina);

 lista.innerHTML = '<div class="grid-produtos">';

 paginaItens.forEach(p=>{
 if(!p.tamanhos){
   p.tamanhos = {UNICO:{total:1,vendido:0}};
 }

 totalInvestido += p.custo || 0;

 let tamanhosHTML='';

 for(let t in p.tamanhos){
 let d=p.tamanhos[t];
 let restante=(d.total||0)-(d.vendido||0);

 totalVendido += (d.vendido||0) * (p.valor||0);
 totalEstoque += restante * (p.valor||0);

 tamanhosHTML+=`
 <div class="tam">
 ${t}: ${restante}
 <button onclick="vender('${p.id}','${t}')">+</button>
 </div>`;
 }

 lista.innerHTML+=`
 <div class="card">
 <img src="${p.img || ''}">
 <b>${p.nome || ''}</b>
 <div>${p.desc || ''}</div>
 <div>R$ ${p.valor || 0}</div>
 ${tamanhosHTML}
 <button class="blue" onclick="editarProduto('${p.id}')">Editar</button>
 <button class="red" onclick="excluir('${p.id}')">Excluir</button>
 </div>`;
 });

 lista.innerHTML += '</div>';

 lista.innerHTML += `
 <div class="paginacao">
 <button onclick="paginaAnterior()">Voltar</button>
 <button onclick="proximaPagina()">Próximo</button>
 </div>
 `;

 document.getElementById('totalEstoque').innerText = totalEstoque.toFixed(2);
 document.getElementById('totalVendido').innerText = totalVendido.toFixed(2);
 document.getElementById('totalInvestido').innerText = totalInvestido.toFixed(2);
 document.getElementById('lucro').innerText = (totalVendido - totalInvestido).toFixed(2);
}
</script>

<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
