<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque CP10</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff7ed;
}

/* LOGIN */
#login{
  max-width:300px;
  margin:80px auto;
  background:#ea580c;
  padding:20px;
  border-radius:10px;
  text-align:center;
  color:white;
}

#login input{
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  margin:10px 0;
}

/* TOPO */
.topo{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#ea580c;
  color:white;
}

.resumo{
  display:flex;
  gap:15px;
  font-size:14px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  padding:10px;
}

.tab{
  padding:8px 15px;
  background:#e2e8f0;
  border-radius:8px;
  cursor:pointer;
}

.tab.ativo{
  background:#ea580c;
  color:white;
}

/* FORM */
.form{
  padding:10px;
}

input{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
  padding:10px;
}

.card{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.info{
  padding:8px;
  font-size:13px;
}

button{
  padding:6px;
  border:none;
  border-radius:6px;
  margin-top:5px;
  cursor:pointer;
}

.green{background:#22c55e;color:white}
.red{background:#ef4444;color:white}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>ESTOQUE CP10</h2>
<input type="password" id="senha" placeholder="Senha">
<button onclick="logar()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<div class="topo">
  <h3>Estoque</h3>
  <div class="resumo">
    <span>Investido: R$ <b id="investido">0</b></span>
    <span>Estoque: R$ <b id="estoque">0</b></span>
    <span>Lucro: R$ <b id="lucro">0</b></span>
  </div>
</div>

<div class="tabs">
  <div class="tab ativo" onclick="trocarTab('add')">Adicionar</div>
  <div class="tab" onclick="trocarTab('lista')">Produtos</div>
</div>

<!-- ADD -->
<div id="add" class="form">
<input type="file" id="foto">
<input type="text" id="nome" placeholder="Nome">
<input type="number" id="custo" placeholder="Custo por peça">
<input type="number" id="valor" placeholder="Valor de venda">
<input type="text" id="tamanhos" placeholder="P:5,M:3,G:2">
<button class="green" onclick="addProduto()">Adicionar</button>
</div>

<!-- LISTA -->
<div id="lista" style="display:none">
<div class="grid" id="produtos"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyD4TfY6Iwrju_aaG1vpN-q1Z9LyiDBeQvQ",
 authDomain:"estoque-app-13f1d.firebaseapp.com",
 projectId:"estoque-app-13f1d"
});

const db = getFirestore(app);

let produtos = [];

/* LOGIN */
window.logar = function(){
 if(document.getElementById("senha").value==="161004"){
   document.getElementById("login").style.display="none";
   document.getElementById("app").style.display="block";
   carregar();
 } else alert("Senha errada");
}

/* TABS */
window.trocarTab = function(tab){
 document.getElementById("add").style.display="none";
 document.getElementById("lista").style.display="none";

 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ativo'));

 if(tab==="add"){
   document.getElementById("add").style.display="block";
   document.querySelectorAll('.tab')[0].classList.add('ativo');
 }else{
   document.getElementById("lista").style.display="block";
   document.querySelectorAll('.tab')[1].classList.add('ativo');
 }
}

/* BASE64 */
function base64(file){
 return new Promise(r=>{
  let reader=new FileReader();
  reader.onload=()=>r(reader.result);
  reader.readAsDataURL(file);
 });
}

/* TAMANHOS */
function parseTam(str){
 let obj={};
 if(!str) return obj;

 str.split(',').forEach(p=>{
  let [t,q]=p.split(':');
  if(t && q) obj[t.trim()]={total:+q,vendido:0};
 });

 return obj;
}

/* ADD */
window.addProduto = async ()=>{
 if(!nome.value || !valor.value || !custo.value || !tamanhos.value){
  alert("Preencha tudo");
  return;
 }

 let file=foto.files[0];
 if(!file) return alert("Imagem obrigatória");

 let img=await base64(file);
 let tam=parseTam(tamanhos.value);

 let total=Object.values(tam).reduce((a,b)=>a+b.total,0);
 let custoTotal=(Number(custo.value)||0)*total;

 await addDoc(collection(db,"produtos"),{
  nome:nome.value,
  valor:Number(valor.value)||0,
  custo:custoTotal,
  tamanhos:tam,
  img
 });

 carregar();
}

/* EDITAR */
window.editarProduto = async(id)=>{
 let p=produtos.find(x=>x.id===id);
 if(!p) return;

 let nomeN=prompt("Nome",p.nome);
 let valorN=prompt("Valor",p.valor);

 await updateDoc(doc(db,"produtos",id),{
  nome:nomeN,
  valor:+valorN
 });

 carregar();
}

/* EXCLUIR */
window.excluirProduto = async(id)=>{
 if(!confirm("Excluir?")) return;
 await deleteDoc(doc(db,"produtos",id));
 carregar();
}

/* VENDER */
window.vender = async(id,tam)=>{
 let p=produtos.find(x=>x.id===id);
 if(!p) return;

 if(!p.tamanhos) p.tamanhos={};

 let t=p.tamanhos[tam];
 if(t.vendido>=t.total) return alert("Sem estoque");

 t.vendido++;

 await updateDoc(doc(db,"produtos",id),{
  tamanhos:p.tamanhos
 });

 carregar();
}

/* CARREGAR */
async function carregar(){
 let snap=await getDocs(collection(db,"produtos"));
 produtos=[];
 snap.forEach(d=>produtos.push({id:d.id,...d.data()}));
 render();
}

/* RENDER */
function render(){
 let container=document.getElementById("produtos");
 container.innerHTML="";

 let investido=0,estoque=0,vendidoTotal=0;

 produtos.forEach(p=>{

 if(!p.tamanhos) p.tamanhos={};

 let tHTML="";
 let estoqueProduto=0;

 for(let t in p.tamanhos){
  let d=p.tamanhos[t];
  let rest=d.total-d.vendido;

  let valorUnit=Number(p.valor)||0;

  vendidoTotal+=d.vendido*valorUnit;
  estoque+=rest*valorUnit;
  estoqueProduto+=rest;

  tHTML+=`
  <div>
    ${t}: ${rest}
    <button onclick="vender('${p.id}','${t}')">+</button>
  </div>`;
 }

 investido+=Number(p.custo)||0;

 if(estoqueProduto>0){
  container.innerHTML+=`
  <div class="card">
    <img src="${p.img}">
    <div class="info">
      <b>${p.nome}</b><br>
      R$ ${p.valor}<br>
      ${tHTML}
      <button onclick="editarProduto('${p.id}')">Editar</button>
      <button class="red" onclick="excluirProduto('${p.id}')">Excluir</button>
    </div>
  </div>`;
 }

 });

 document.getElementById("investido").innerText=investido.toFixed(2);
 document.getElementById("estoque").innerText=estoque.toFixed(2);
 document.getElementById("lucro").innerText=(vendidoTotal-investido).toFixed(2);
}
</script>

</body>
</html>
