<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CP10 SPORTS</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b00">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#0f0f0f;
  color:white;
}

#login{
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#000,#ea580c);
}

.login-box{
  width:320px;
  background:#111;
  border:2px solid #ea580c;
  border-radius:20px;
  padding:30px;
  text-align:center;
  box-shadow:0 0 20px rgba(234,88,12,.4);
}

.login-box h1{
  color:#ea580c;
  margin-bottom:25px;
}

.login-box input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:15px;
  background:#1e1e1e;
  color:white;
}

.login-box button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ea580c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#app{
  display:none;
}

.topo{
  background:#111;
  padding:15px;
  border-bottom:2px solid #ea580c;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  color:#ea580c;
  font-size:28px;
  font-weight:bold;
}

.resumo{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  margin-top:15px;
}

.box{
  background:#1b1b1b;
  padding:12px;
  border-radius:12px;
  border:1px solid #2a2a2a;
}

.box b{
  color:#ea580c;
}

.tabs{
  display:flex;
  gap:10px;
  padding:15px;
}

.tab{
  flex:1;
  text-align:center;
  background:#1b1b1b;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  border:1px solid #2a2a2a;
}

.tab.ativo{
  background:#ea580c;
}

.form{
  padding:15px;
}

.form input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#1b1b1b;
  color:white;
}

.form button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ea580c;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
  padding:10px;
}

.card{
  background:#111;
  border:1px solid #222;
  border-radius:12px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  display:block;
}

.info{
  padding:15px;
}

.nome{
  font-size:20px;
  font-weight:bold;
  margin-bottom:8px;
}

.preco{
  color:#22c55e;
  font-size:18px;
  margin-bottom:10px;
}

.tamanho{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1f1f1f;
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
}

.btn-vender{
  background:#22c55e;
  border:none;
  color:white;
  width:30px;
  height:30px;
  border-radius:50%;
  cursor:pointer;
}

.botoes{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.edit{
  flex:1;
  background:#3b82f6;
  border:none;
  color:white;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.delete{
  flex:1;
  background:#ef4444;
  border:none;
  color:white;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.ranking{
  margin:15px;
  background:#161616;
  border-radius:20px;
  padding:20px;
  border:1px solid #2a2a2a;
}

.ranking h2{
  color:#ea580c;
  margin-bottom:15px;
}

.rank-item{
  background:#1f1f1f;
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}
</style>
</head>
<body>

<div id="login">
  <div class="login-box">
    <h1>CP10 SPORTS</h1>
    <input type="password" id="senha" placeholder="Digite sua senha">
    <button onclick="logar()">ENTRAR</button>
  </div>
</div>

<div id="app">

<div class="topo">
  <div class="logo">CP10 SPORTS</div>

  <div class="resumo">
    <div class="box">
      Investido<br>
      <b>R$ <span id="investido">0</span></b>
    </div>

    <div class="box">
      Em estoque<br>
      <b>R$ <span id="estoque">0</span></b>
    </div>

    <div class="box">
      Lucro<br>
      <b>R$ <span id="lucro">0</span></b>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab ativo" onclick="trocarTab('add')">Adicionar</div>
  <div class="tab" onclick="trocarTab('produtos')">Produtos</div>
</div>

<div id="add" class="form">
  <input type="file" id="foto">
  <input type="text" id="nome" placeholder="Nome da camisa">
  <input type="number" id="custo" placeholder="Valor pago por peça">
  <input type="number" id="valor" placeholder="Valor de venda">
  <input type="text" id="tamanhos" placeholder="P:5,M:3,G:2">
  <button onclick="addProduto()">Adicionar Produto</button>
</div>

<div id="produtos" style="display:none">
  <div class="grid" id="listaProdutos"></div>

  <div class="ranking">
    <h2>🔥 Histórico de Vendas</h2>
    <div id="historico"></div>
  </div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4TfY6Iwrju_aaG1vpN-q1Z9LyiDBeQvQ",
  authDomain: "estoque-app-13f1d.firebaseapp.com",
  projectId: "estoque-app-13f1d",
  storageBucket: "estoque-app-13f1d.firebasestorage.app",
  messagingSenderId: "193095930583",
  appId: "1:193095930583:web:88587ee9f4e10076619692",
  measurementId: "G-Y99TQTKNRG"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let produtos = [];

window.logar = function(){

  let senha = document.getElementById('senha').value;

  if(senha === '161004'){

    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';

    carregar();

  }else{
    alert('Senha incorreta');
  }
}

async function carregar(){

  let snap = await getDocs(collection(db,"produtos"));

  produtos = [];

  snap.forEach(docu=>{
    produtos.push({
      id:docu.id,
      ...docu.data()
    });
  });

  render();
}

window.trocarTab = function(tab){

  document.getElementById('add').style.display = 'none';
  document.getElementById('produtos').style.display = 'none';

  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.remove('ativo');
  });

  if(tab === 'add'){
    document.getElementById('add').style.display = 'block';
    document.querySelectorAll('.tab')[0].classList.add('ativo');
  }else{
    document.getElementById('produtos').style.display = 'block';
    document.querySelectorAll('.tab')[1].classList.add('ativo');
  }
}

function converterBase64(file){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

function parseTam(str){

  let obj = {};

  str.split(',').forEach(item=>{

    let [tam,qtd] = item.split(':');

    obj[tam.trim()] = {
      total:Number(qtd),
      vendido:0
    };
  });

  return obj;
}

window.addProduto = async function(){

  const file = document.getElementById('foto').files[0];
  const nome = document.getElementById('nome').value;
  const custo = Number(document.getElementById('custo').value);
  const valor = Number(document.getElementById('valor').value);
  const tamanhos = document.getElementById('tamanhos').value;

  if(!file || !nome || !custo || !valor || !tamanhos){
    alert('Preencha tudo');
    return;
  }

  const img = await converterBase64(file);

  await addDoc(collection(db,"produtos"),{
    nome,
    custo,
    valor,
    img,
    tamanhos:parseTam(tamanhos)
  });

  carregar();
}

window.vender = async function(id,tamanho){

  let produto = produtos.find(p=>p.id === id);

  if(!produto) return;

  let t = produto.tamanhos[tamanho];

  if(t.vendido >= t.total){
    alert('Sem estoque');
    return;
  }

  t.vendido++;

  await updateDoc(doc(db,"produtos",id),{
    tamanhos:produto.tamanhos
  });

  carregar();
}

window.excluirProduto = async function(id){

  if(confirm('Deseja excluir?')){

    await deleteDoc(doc(db,"produtos",id));

    carregar();
  }
}

window.editarProduto = async function(id){

  let produto = produtos.find(p=>p.id === id);

  if(!produto) return;

  let novoNome = prompt('Novo nome', produto.nome);
  let novoValor = prompt('Novo valor', produto.valor);

  if(novoNome) produto.nome = novoNome;
  if(novoValor) produto.valor = Number(novoValor);

  await updateDoc(doc(db,"produtos",id),{
    nome:produto.nome,
    valor:produto.valor
  });

  carregar();
}

function render(){

  const lista = document.getElementById('listaProdutos');
  const historico = document.getElementById('historico');

  lista.innerHTML = '';
  historico.innerHTML = '';

  let investido = 0;
  let estoque = 0;
  let vendidoTotal = 0;
  let custoVendido = 0;

  let ranking = [];

  produtos.forEach(produto=>{

    let htmlTam = '';
    let vendidosProduto = 0;
    let estoqueProduto = 0;
    let totalPecas = 0;

    for(let t in produto.tamanhos){

      let dados = produto.tamanhos[t];

      let restante = dados.total - dados.vendido;

      totalPecas += dados.total;

      vendidosProduto += dados.vendido;

      estoqueProduto += restante;

      // TOTAL VENDIDO
      vendidoTotal += dados.vendido * produto.valor;

      // CUSTO DOS ITENS VENDIDOS
      custoVendido += dados.vendido * produto.custo;

      // VALOR EM ESTOQUE
      estoque += restante * produto.valor;

      htmlTam += `
      <div class="tamanho">

        <span>
        ${t}: ${restante} restantes
        </span>

        <button class="btn-vender"
        onclick="vender('${produto.id}','${t}')">
        +
        </button>

      </div>`;
    }

    // INVESTIMENTO TOTAL
    investido += totalPecas * produto.custo;

    // MOSTRAR SOMENTE SE TIVER ESTOQUE
    if(estoqueProduto > 0){

      lista.innerHTML += `
      <div class="card">

        <img src="${produto.img}">

        <div class="info">

          <div class="nome">
          ${produto.nome}
          </div>

          <div class="preco">
          R$ ${produto.valor}
          </div>

          ${htmlTam}

          <div class="botoes">

            <button class="edit"
            onclick="editarProduto('${produto.id}')">
            Editar
            </button>

            <button class="delete"
            onclick="excluirProduto('${produto.id}')">
            Excluir
            </button>

          </div>

        </div>

      </div>`;
    }

    ranking.push({
      id: produto.id,
      nome: produto.nome,
      vendidos: vendidosProduto,
      tamanhos: produto.tamanhos
    });

  });

  // ORDENA MAIS VENDIDOS
  ranking.sort((a,b)=>b.vendidos-a.vendidos);

  ranking.forEach(item=>{

    let detalhes = '';

    for(let t in item.tamanhos){

      detalhes += `
      ${t}: ${item.tamanhos[t].vendido} vendidos<br>
      `;
    }

    historico.innerHTML += `

    <div class="rank-item">

      <b>${item.nome}</b><br>

      Total vendido: ${item.vendidos}<br><br>

      ${detalhes}

      <div class="botoes">

        <button class="edit"
        onclick="editarProduto('${item.id}')">
        Editar
        </button>

        <button class="delete"
        onclick="excluirProduto('${item.id}')">
        Excluir
        </button>

      </div>

    </div>`;
  });

  // ATUALIZA RESUMO
  document.getElementById('investido').innerText =
  investido.toFixed(2);

  document.getElementById('estoque').innerText =
  estoque.toFixed(2);

  document.getElementById('lucro').innerText =
  (vendidoTotal - custoVendido).toFixed(2);
}
</script>

</body>
</html>
