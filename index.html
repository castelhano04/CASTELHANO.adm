<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:10px
}

.container{max-width:1100px;margin:auto}

h2{text-align:center}

.topo{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:10px
}

.card-top{
background:#1e293b;
padding:10px;
border-radius:10px;
text-align:center;
font-size:14px
}

input,textarea,select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold
}

.green{background:#22c55e;color:white}
.red{background:#ef4444;color:white}
.blue{background:#3b82f6;color:white}
.gray{background:#334155;color:white}

.grid-produtos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:12px;
margin-top:10px
}

.card{
background:#1e293b;
border-radius:12px;
overflow:hidden;
padding:8px;
display:flex;
flex-direction:column;
gap:5px
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px
}

.nome{font-size:15px;font-weight:bold}
.info{font-size:13px;color:#cbd5f5}

.tamanhos{
background:#0f172a;
padding:5px;
border-radius:8px
}

.tam{
display:flex;
justify-content:space-between;
align-items:center;
margin:3px 0
}

.tam button{
padding:3px 8px;
font-size:12px
}

.actions{
display:flex;
gap:5px;
margin-top:5px
}

.paginacao{
display:flex;
justify-content:space-between;
margin-top:15px
}
</style>
</head>

<body>
<div class="container">

<div id="login">
<h2>Login</h2>
<input type="password" id="senha" placeholder="Senha">
<button class="green" onclick="logar()">Entrar</button>
</div>

<div id="app" style="display:none">

<h2>Controle de Estoque</h2>

<div class="topo">
<div class="card-top">Estoque<br>R$ <span id="totalEstoque">0</span></div>
<div class="card-top">Vendido<br>R$ <span id="totalVendido">0</span></div>
<div class="card-top">Investido<br>R$ <span id="totalInvestido">0</span></div>
<div class="card-top">Lucro<br>R$ <span id="lucro">0</span></div>
</div>

<input type="file" id="foto">
<input type="text" id="nome" placeholder="Nome">
<textarea id="desc" placeholder="Descrição"></textarea>

<select id="categoria">
<option>Europeu</option>
<option>Seleções</option>
<option>Brasil</option>
<option>Outros</option>
</select>

<input type="number" id="valor" placeholder="Valor venda">
<input type="number" id="custo" placeholder="Custo unitário">
<input type="text" id="tamanhos" placeholder="P:2,M:3,G:1">

<button class="green" onclick="addProduto()">Adicionar</button>

<select id="filtro" onchange="render()">
<option value="Todos">Todos</option>
<option value="Europeu">Europeu</option>
<option value="Seleções">Seleções</option>
<option value="Brasil">Brasil</option>
<option value="Outros">Outros</option>
</select>

<div id="lista"></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey: "AIzaSyD4TfY6Iwrju_aaG1vpN-q1Z9LyiDBeQvQ",
 authDomain: "estoque-app-13f1d.firebaseapp.com",
 projectId: "estoque-app-13f1d",
});

const db = getFirestore(app);

let produtos=[];
let pagina=1;
const porPagina=6;

window.logar=()=>{
 if(senha.value==="161004"){
 login.style.display="none";
 app.style.display="block";
 carregar();
 }else alert("Senha errada");
}

async function carregar(){
 const snap=await getDocs(collection(db,"produtos"));
 produtos=[];
 snap.forEach(d=>produtos.push({id:d.id,...d.data()}));
 render();
}

function base64(file){
 return new Promise(r=>{
 let reader=new FileReader();
 reader.onload=()=>r(reader.result);
 reader.readAsDataURL(file);
 });
}

function parseTam(str){
 let obj={};
 str.split(',').forEach(p=>{
 let [t,q]=p.split(':');
 if(t&&q)obj[t.trim()]={total:+q,vendido:0};
 });
 return obj;
}

window.addProduto=async()=>{
 let file=foto.files[0];
 if(!file) return alert("Selecione imagem");

 let img=await base64(file);
 let tam=parseTam(tamanhos.value);

 let total=Object.values(tam).reduce((a,b)=>a+b.total,0);
 let custoTotal=custo.value*total;

 await addDoc(collection(db,"produtos"),{
 nome:nome.value,
 desc:desc.value,
 categoria:categoria.value,
 valor:+valor.value,
 custo:custoTotal,
 tamanhos:tam,
 img
 });

 carregar();
}

window.vender=async(id,t)=>{
 let p=produtos.find(x=>x.id===id);
 if(p.tamanhos[t].vendido>=p.tamanhos[t].total)return;

 p.tamanhos[t].vendido++;
 await updateDoc(doc(db,"produtos",id),{tamanhos:p.tamanhos});
 carregar();
}

window.remover=async(id)=>{
 await deleteDoc(doc(db,"produtos",id));
 carregar();
}

window.editar=async(id)=>{
 let p=produtos.find(x=>x.id===id);

 let novoNome=prompt("Nome",p.nome);
 let novoDesc=prompt("Desc",p.desc);
 let novoValor=+prompt("Valor",p.valor);
 let novoTam=prompt("Tam", "P:2,M:3");

 await updateDoc(doc(db,"produtos",id),{
 nome:novoNome,
 desc:novoDesc,
 valor:novoValor,
 tamanhos:parseTam(novoTam)
 });

 carregar();
}

function render(){
 let f=filtro.value;
 let lista=document.getElementById("lista");

 let filtrados=produtos.filter(p=>f==="Todos"||p.categoria===f);

 let start=(pagina-1)*porPagina;
 let itens=filtrados.slice(start,start+porPagina);

 let estoque=0,vendido=0,investido=0;

 lista.innerHTML='<div class="grid-produtos">';

 itens.forEach(p=>{
 investido+=p.custo;

 let tHTML='';
 for(let t in p.tamanhos){
 let d=p.tamanhos[t];
 let rest=d.total-d.vendido;

 vendido+=d.vendido*p.valor;
 estoque+=rest*p.valor;

 tHTML+=`
 <div class="tam">
 ${t}: ${rest}
 <button onclick="vender('${p.id}','${t}')">+</button>
 </div>`;
 }

 lista.innerHTML+=`
 <div class="card">
 <img src="${p.img}">
 <div class="nome">${p.nome}</div>
 <div class="info">${p.desc}</div>
 <div class="info">R$ ${p.valor}</div>

 <div class="tamanhos">${tHTML}</div>

 <div class="actions">
 <button class="blue" onclick="editar('${p.id}')">Editar</button>
 <button class="red" onclick="remover('${p.id}')">Excluir</button>
 </div>
 </div>`;
 });

 lista.innerHTML+='</div>';

 lista.innerHTML+=`
 <div class="paginacao">
 <button class="gray" onclick="pagina--,render()">Voltar</button>
 <button class="gray" onclick="pagina++,render()">Próximo</button>
 </div>
 `;

 totalEstoque.innerText=estoque.toFixed(2);
 totalVendido.innerText=vendido.toFixed(2);
 totalInvestido.innerText=investido.toFixed(2);
 lucro.innerText=(vendido-investido).toFixed(2);
}
</script>

<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
