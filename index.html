<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body{
  font-family: 'Segoe UI', Arial;
  background:#0f172a;
  color:white;
  margin:0;
  padding:15px;
}

.container{
  max-width:1300px;
  margin:auto;
}

/* TOPO */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

/* FORM */
input,textarea,select{
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

button{
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

/* CATÁLOGO */
.grid-produtos{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:15px;
  margin-top:15px;
}

.card-produto{
  background:#1e293b;
  border-radius:14px;
  overflow:hidden;
  transition:0.2s;
}

.card-produto:hover{
  transform:scale(1.03);
}

/* IMAGEM */
.card-produto img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CONTEÚDO */
.produto-info{
  padding:10px;
}

.nome{
  font-size:15px;
  font-weight:bold;
}

.desc{
  font-size:12px;
  color:#cbd5e1;
  margin:4px 0;
}

.preco{
  font-size:16px;
  color:#22c55e;
  font-weight:bold;
}

/* TAMANHOS */
.tamanhos{
  margin-top:8px;
}

.tam{
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

/* BOTÕES */
.btns{
  display:flex;
  gap:5px;
  margin-top:8px;
}

.vender{background:#22c55e;color:white}
.editar{background:#3b82f6;color:white}
.excluir{background:#ef4444;color:white}

/* PAGINAÇÃO */
.paginacao{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

/* MOBILE */
@media(max-width:600px){
  .grid-produtos{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>
<div class="container">

<div id="login">
<h2>Login</h2>
<input type="password" id="senha" placeholder="Senha">
<button onclick="logar()">Entrar</button>
</div>

<div id="app" style="display:none">

<h2>Meu Estoque</h2>

<div class="grid">
<div class="card">Estoque R$ <span id="totalEstoque">0</span></div>
<div class="card">Vendido R$ <span id="totalVendido">0</span></div>
<div class="card">Investido R$ <span id="totalInvestido">0</span></div>
<div class="card">Lucro R$ <span id="lucro">0</span></div>
</div>

<input type="file" id="foto">
<input type="text" id="nome" placeholder="Nome">
<textarea id="desc" placeholder="Descrição"></textarea>

<select id="categoria">
<option>Europeu</option>
<option>Seleções</option>
<option>Brasil</option>
<option>Outros</option>
</select>

<input type="number" id="valor" placeholder="Valor">
<input type="number" id="custo" placeholder="Custo unitário">
<input type="text" id="tamanhos" placeholder="P:2,M:3,G:1">

<button onclick="addProduto()">Adicionar</button>

<select id="filtro" onchange="paginaAtual=1; render()">
<option value="Todos">Todos</option>
<option value="Europeu">Europeu</option>
<option value="Seleções">Seleções</option>
<option value="Brasil">Brasil</option>
<option value="Outros">Outros</option>
</select>

<div id="lista"></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey: "AIzaSyD4TfY6Iwrju_aaG1vpN-q1Z9LyiDBeQvQ",
 authDomain: "estoque-app-13f1d.firebaseapp.com",
 projectId: "estoque-app-13f1d",
});

const db = getFirestore(app);

let produtos = [];
let paginaAtual = 1;
const itensPorPagina = 15;

/* LOGIN */
window.logar = function(){
 if(senha.value==="161004"){
   login.style.display="none";
   app.style.display="block";
   carregar();
 } else alert("Senha errada");
}

/* CARREGAR */
async function carregar(){
 const snap = await getDocs(collection(db,"produtos"));
 produtos=[];
 snap.forEach(d=>produtos.push({id:d.id,...d.data()}));
 render();
}

/* BASE64 */
function base64(file){
 return new Promise(r=>{
 let reader=new FileReader();
 reader.onload=()=>r(reader.result);
 reader.readAsDataURL(file);
 });
}

/* TAMANHOS */
function parseTam(str){
 let obj={};
 if(!str) return obj;
 str.split(',').forEach(p=>{
 let [t,q]=p.split(':');
 if(t&&q)obj[t.trim()]={total:+q,vendido:0};
 });
 return obj;
}

/* ADD */
window.addProduto = async()=>{
 let file=foto.files[0];
 if(!file) return alert("Imagem obrigatória");

 let img=await base64(file);
 let tam=parseTam(tamanhos.value);

 let total=Object.values(tam).reduce((a,b)=>a+b.total,0);
 let custoTotal=custo.value*total;

 await addDoc(collection(db,"produtos"),{
 nome:nome.value,
 desc:desc.value,
 categoria:categoria.value,
 valor:+valor.value,
 custo:custoTotal,
 tamanhos:tam,
 img
 });

 carregar();
}

/* VENDER */
window.vender = async(id,t)=>{
 let p=produtos.find(x=>x.id===id);
 if(!p || !p.tamanhos[t]) return;

 if(p.tamanhos[t].vendido>=p.tamanhos[t].total) return;

 p.tamanhos[t].vendido++;
 await updateDoc(doc(db,"produtos",id),{tamanhos:p.tamanhos});
 carregar();
}

/* EXCLUIR */
window.excluir = async(id)=>{
 await deleteDoc(doc(db,"produtos",id));
 carregar();
}

/* EDITAR */
window.editarProduto = async(id)=>{
 let p=produtos.find(x=>x.id===id);
 if(!p) return;

 let nomeN=prompt("Nome",p.nome);
 let descN=prompt("Desc",p.desc);
 let valorN=+prompt("Valor",p.valor);
 let tamN=prompt("Tam","P:2,M:3");

 await updateDoc(doc(db,"produtos",id),{
 nome:nomeN,
 desc:descN,
 valor:valorN,
 tamanhos:parseTam(tamN)
 });

 carregar();
}

/* PAGINAÇÃO */
window.proximaPagina=()=>{paginaAtual++;render()}
window.paginaAnterior=()=>{if(paginaAtual>1){paginaAtual--;render()}}

/* RENDER */
function render(){
 let lista=document.getElementById("lista");
 let filtro=document.getElementById("filtro").value;

 let filtrados=produtos.filter(p=>filtro==="Todos"||p.categoria===filtro);

 let inicio=(paginaAtual-1)*itensPorPagina;
 let itens=filtrados.slice(inicio,inicio+itensPorPagina);

 let estoque=0,vendido=0,investido=0;

 lista.innerHTML='<div class="grid-produtos">';

 itens.forEach(p=>{
 if(!p.tamanhos) p.tamanhos={UNICO:{total:1,vendido:0}};

 investido+=p.custo||0;

 let tHTML='';

 for(let t in p.tamanhos){
 let d=p.tamanhos[t];
 let rest=d.total-d.vendido;

 vendido+=d.vendido*p.valor;
 estoque+=rest*p.valor;

 tHTML+=`
 <div class="tam">
 ${t}: ${rest}
 <button class="vender" onclick="vender('${p.id}','${t}')">+</button>
 </div>`;
 }

 lista.innerHTML+=`
 <div class="card-produto">
   <img src="${p.img || ''}">
   <div class="produto-info">
     <div class="nome">${p.nome}</div>
     <div class="desc">${p.desc}</div>
     <div class="preco">R$ ${p.valor}</div>
     <div class="tamanhos">${tHTML}</div>
     <div class="btns">
       <button class="editar" onclick="editarProduto('${p.id}')">Editar</button>
       <button class="excluir" onclick="excluir('${p.id}')">X</button>
     </div>
   </div>
 </div>`;
 });

 lista.innerHTML+='</div>';

 lista.innerHTML+=`
 <div class="paginacao">
 <button onclick="paginaAnterior()">Voltar</button>
 <button onclick="proximaPagina()">Próximo</button>
 </div>
 `;

 totalEstoque.innerText=estoque.toFixed(2);
 totalVendido.innerText=vendido.toFixed(2);
 totalInvestido.innerText=investido.toFixed(2);
 lucro.innerText=(vendido-investido).toFixed(2);
}
</script>

</body>
</html>
