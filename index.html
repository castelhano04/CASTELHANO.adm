<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  margin:0;
  padding:15px;
  color:#111;
}

.container{
  max-width:1300px;
  margin:auto;
}

/* TOPO */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  background:white;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  text-align:center;
  font-weight:bold;
}

/* FORM */
input,textarea,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

/* BOTÕES */
button{
  padding:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.green{background:#22c55e;color:white}
.blue{background:#3b82f6;color:white}
.red{background:#ef4444;color:white}

/* GRID LOJA */
.grid-produtos{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:15px;
  margin-top:20px;
}

/* CARD */
.card-produto{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  transition:0.2s;
}

.card-produto:hover{
  transform:translateY(-3px);
}

/* IMAGEM */
.card-produto img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CONTEUDO */
.produto-info{
  padding:10px;
}

.nome{
  font-size:14px;
  font-weight:bold;
}

.desc{
  font-size:12px;
  color:#555;
  margin:4px 0;
}

.preco{
  font-size:18px;
  color:#16a34a;
  font-weight:bold;
}

/* TAMANHOS */
.tam{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  margin:3px 0;
}

/* BOTÕES CARD */
.btns{
  display:flex;
  gap:5px;
  margin-top:8px;
}

.btns button{
  flex:1;
}

/* PAGINAÇÃO */
.paginacao{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

/* MOBILE */
@media(max-width:600px){
  .grid-produtos{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>
</head>

<body>
<div class="container">

<div id="login">
<h2>Login</h2>
<input type="password" id="senha">
<button class="green" onclick="logar()">Entrar</button>
</div>

<div id="app" style="display:none">

<h2>Meu Estoque</h2>

<div class="grid">
<div class="card">Estoque R$ <span id="totalEstoque">0</span></div>
<div class="card">Vendido R$ <span id="totalVendido">0</span></div>
<div class="card">Investido R$ <span id="totalInvestido">0</span></div>
<div class="card">Lucro R$ <span id="lucro">0</span></div>
</div>

<input type="file" id="foto">
<input type="text" id="nome" placeholder="Nome">
<textarea id="desc" placeholder="Descrição"></textarea>

<select id="categoria">
<option>Europeu</option>
<option>Seleções</option>
<option>Brasil</option>
<option>Outros</option>
</select>

<input type="number" id="valor" placeholder="Valor">
<input type="number" id="custo" placeholder="Custo unitário">
<input type="text" id="tamanhos" placeholder="P:2,M:3,G:1">

<button class="green" onclick="addProduto()">Adicionar</button>

<select id="filtro" onchange="paginaAtual=1; render()">
<option value="Todos">Todos</option>
<option value="Europeu">Europeu</option>
<option value="Seleções">Seleções</option>
<option value="Brasil">Brasil</option>
<option value="Outros">Outros</option>
</select>

<div id="lista"></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey: "AIzaSyD4TfY6Iwrju_aaG1vpN-q1Z9LyiDBeQvQ",
 authDomain: "estoque-app-13f1d.firebaseapp.com",
 projectId: "estoque-app-13f1d",
});

const db = getFirestore(app);

let produtos=[];
let paginaAtual=1;
const itensPorPagina=15;

window.logar=function(){
 if(document.getElementById("senha").value==="161004"){
   login.style.display="none";
   app.style.display="block";
   carregar();
 } else alert("Senha errada");
}

async function carregar(){
 const snap=await getDocs(collection(db,"produtos"));
 produtos=[];
 snap.forEach(d=>produtos.push({id:d.id,...d.data()}));
 render();
}

function base64(file){
 return new Promise(r=>{
 let reader=new FileReader();
 reader.onload=()=>r(reader.result);
 reader.readAsDataURL(file);
 });
}

function parseTam(str){
 let obj={};
 str.split(',').forEach(p=>{
 let [t,q]=p.split(':');
 if(t&&q)obj[t.trim()]={total:+q,vendido:0};
 });
 return obj;
}

window.addProduto=async()=>{
 let img=await base64(foto.files[0]);
 let tam=parseTam(tamanhos.value);

 let total=Object.values(tam).reduce((a,b)=>a+b.total,0);

 await addDoc(collection(db,"produtos"),{
 nome:nome.value,
 desc:desc.value,
 categoria:categoria.value,
 valor:+valor.value,
 custo:custo.value*total,
 tamanhos:tam,
 img
 });

 carregar();
}

window.vender=async(id,t)=>{
 let p=produtos.find(x=>x.id===id);
 if(p.tamanhos[t].vendido>=p.tamanhos[t].total) return;
 p.tamanhos[t].vendido++;
 await updateDoc(doc(db,"produtos",id),{tamanhos:p.tamanhos});
 carregar();
}

window.excluir=async(id)=>{
 await deleteDoc(doc(db,"produtos",id));
 carregar();
}

window.editarProduto=async(id)=>{
 let p=produtos.find(x=>x.id===id);
 await updateDoc(doc(db,"produtos",id),{
 nome:prompt("Nome",p.nome),
 desc:prompt("Desc",p.desc),
 valor:+prompt("Valor",p.valor),
 tamanhos:parseTam(prompt("Tam","P:2,M:3"))
 });
 carregar();
}

function render(){
 let lista=document.getElementById("lista");
 let filtro=document.getElementById("filtro").value;

 let filtrados=produtos.filter(p=>filtro==="Todos"||p.categoria===filtro);

 let inicio=(paginaAtual-1)*itensPorPagina;
 let itens=filtrados.slice(inicio,inicio+itensPorPagina);

 let estoque=0,vendido=0,investido=0;

 lista.innerHTML='<div class="grid-produtos">';

 itens.forEach(p=>{
 let tHTML="";
 for(let t in p.tamanhos){
 let d=p.tamanhos[t];
 let rest=d.total-d.vendido;

 vendido+=d.vendido*p.valor;
 estoque+=rest*p.valor;

 tHTML+=`
 <div class="tam">
 ${t}: ${rest}
 <button class="green" onclick="vender('${p.id}','${t}')">+</button>
 </div>`;
 }

 lista.innerHTML+=`
 <div class="card-produto">
   <img src="${p.img}">
   <div class="produto-info">
     <div class="nome">${p.nome}</div>
     <div class="desc">${p.desc}</div>
     <div class="preco">R$ ${p.valor}</div>
     ${tHTML}
     <div class="btns">
       <button class="blue" onclick="editarProduto('${p.id}')">Editar</button>
       <button class="red" onclick="excluir('${p.id}')">Excluir</button>
     </div>
   </div>
 </div>`;
 });

 lista.innerHTML+='</div>';

 lista.innerHTML+=`
 <div class="paginacao">
 <button onclick="paginaAtual--,render()">Voltar</button>
 <button onclick="paginaAtual++,render()">Próximo</button>
 </div>
 `;

 totalEstoque.innerText=estoque.toFixed(2);
 totalVendido.innerText=vendido.toFixed(2);
 totalInvestido.innerText=investido.toFixed(2);
 lucro.innerText=(vendido-investido).toFixed(2);
}
</script>

</body>
</html>
