<style>
*{
  margin:0;

body{

/* ===== PRODUTOS - LAYOUT PROFISSIONAL ===== */

#produtos{

/* GRID */

  display:grid;
  grid-template-columns:

  padding:12px;
}

@media(max-width:600px){

.card{

}

}

  /* FOTO DO PRODUTO */

  height:260px;
  background:#181818;

  align-items:center;

}

/* FOTO PADRONIZADA */
.produto-img{
  max-width:100%;

  height:auto;

  display:block;
}

}

.foto-btn:hover{
  background:#ea580c;
}

.foto-prev{
  left:10px;
}

.foto-next{
  right:10px;
}
  .tamanho{

  justify-content:space-between;
  align-items:center;
  background:#1b1b1b;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

.btn-vender{

  height:34px;
  border:none;
  border-radius:50%;
  background:#22c55e;
  color:white;
  cursor:pointer;
  font-size:18px;
}

.botoes{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.edit{
  flex:1;
  background:#3b82f6;
}

.delete{
  flex:1;
  background:#ef4444;
}

.ranking{
  margin:12px;
  background:#151515;
  border-radius:18px;
  padding:14px;
  border:1px solid #262626;
}

.ranking h2{
  font-size:20px;

}

.rank-item{
  background:#1f1f1f;
  border:1px solid #2e2e2e;

}

.rank-item b{

}

.rank-item .botoes{

}

.rank-item button{
  height:30px;
  border:none;
  border-radius:8px;
  font-size:11px;

}

.rank-item .edit{

  color:white;
}

.rank-item .delete{

}

/* ===== HISTÓRICO DE VENDAS ===== */
#historico,
#pedidos{
  padding:12px;
}

.historico-topo{
  margin:12px;
  background:#151515;
  border-radius:18px;
  padding:14px;
  border:1px solid #262626;
}

.historico-topo h2{
  color:#ea580c;
  font-size:20px;
  margin-bottom:8px;
}

.historico-lista{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:12px;
  padding:12px;
}

.venda-card{
  background:#121212;
  border:1px solid #252525;
  border-radius:18px;
  padding:14px;
  box-shadow:0 6px 20px rgba(0,0,0,.35);
}

.venda-card b{
  color:#ea580c;
  font-size:16px;
}

.venda-card p{
  font-size:13px;
  margin-top:6px;
  color:#ddd;
}

.venda-lucro{
  color:#22c55e;
  font-weight:bold;
}

.venda-vazio{
  margin:12px;
  background:#151515;
  border:1px dashed #333;
  border-radius:18px;
  padding:20px;
  text-align:center;
  color:#aaa;
}

  video{
  display:none !important;
}
  
  
</style>
</head>
<body>

<div id="login">

</div>

<div id="app">

<div class="topo">
  <div class="logo">Castelhano Sport's</div>

  <!-- CONTROLE FINANCEIRO - APARECE NO INÍCIO APÓS LOGIN -->
  <div class="resumo">
    <div class="box">
      <b>Investimento</b><br>

<div id="add" class="form">
  
  <input type="file" id="foto" multiple accept="image/*">
  <input type="text" id="nome" placeholder="Nome da camisa">
  <textarea
id="descricao"
placeholder="Descrição da camisa"
style="
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#1b1b1b;
color:white;
margin-bottom:10px;
resize:vertical;
min-height:80px;
"></textarea>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
addDoc,
doc,
getDoc,
deleteDoc,
updateDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4TfY6Iwrju_aaG1vpN-q1Z9LyiDBeQvQ",
  authDomain: "estoque-app-13f1d.firebaseapp.com",
  projectId: "estoque-app-13f1d",
  storageBucket: "estoque-app-13f1d.appspot.com",
  messagingSenderId: "193095930583",
  appId: "1:193095930583:web:88587ee9f4e10076619692",
  measurementId: "G-Y99TQTKNRG"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let produtos = [];

  function verificarLogin(){

  const expiraEm =
  localStorage.getItem('adminExpira');

  if(!expiraEm) return;

  if(Date.now() < Number(expiraEm)){

    document.getElementById('login')
    .style.display = 'none';

    document.getElementById('app')
    .style.display = 'block';

    carregar();
  }

}
  
function logar(){

  let senha =
  document.getElementById('senha').value;

if(senha === '161004'){

  localStorage.setItem(
    'adminExpira',
    Date.now() + (2 * 60 * 1000)
  );

    document.getElementById('login')
    .style.display = 'none';

    document.getElementById('app')
    .style.display = 'block';

    carregar();

  }else{
    alert('Senha incorreta');
  }
}

window.logar = logar;

async function carregar(){

  let snapProdutos =
  await getDocs(
    collection(db,"produtos")
  );

  produtos = [];

  snapProdutos.forEach(docu=>{

    produtos.push({
      id: docu.id,
      ...docu.data()
    });

  });

  render();
}
  
window.trocarTab = function(tab){

  document.getElementById('add').style.display = 'none';
  document.getElementById('produtos').style.display = 'none';
  document.getElementById('pedidos').style.display = 'none';
  document.getElementById('historico').style.display = 'none';

  document
  .querySelectorAll('.tab')
  .forEach(t=>{
    t.classList.remove('ativo');
  });

  document.getElementById(tab).style.display = 'block';

  const tabAtiva =
  document.querySelector(`.tab[data-tab="${tab}"]`);

  if(tabAtiva){
    tabAtiva.classList.add('ativo');
  }

  if(tab === 'historico'){
    renderHistoricoVendas();
  }

}
  
  function parseTam(str){

  let obj = {};

  str.split(',').forEach(item=>{

    let [tam,qtd] = item.split(':');

    obj[tam.trim()] = {
      total:Number(qtd),
      vendido:0
    };

  });

  return obj;
}
  
window.addProduto = async function(){

  try{

    const files =
    document.getElementById('foto').files;

    const nome =
    document.getElementById('nome').value.trim();

        const descricao =
document.getElementById('descricao').value.trim();

    const custo =
    Number(document.getElementById('custo').value);

    const valor =
    Number(document.getElementById('valor').value);

    const tamanhos =
    document.getElementById('tamanhos').value.trim();
    const categoria =
document.getElementById('categoria').value;

  if(
  files.length === 0 ||
  !nome ||
  !custo ||
  !valor ||
  !tamanhos ||
  !categoria
){
  alert('Preencha tudo');
  return;
}
    
    let imagens = [];

    // SALVA IMAGENS DIRETO NO FIRESTORE
    for(let file of files){

      // evita erro de documento gigante
      if(file.size > 800000){
        alert(
          'Imagem muito pesada. Máximo 800KB por foto'
        );
        return;
      }

      const base64 =
      await new Promise((resolve,reject)=>{

        const reader =
        new FileReader();

        reader.onload = ()=>{
          resolve(reader.result);
        };

        reader.onerror = reject;

        reader.readAsDataURL(file);
      });

      imagens.push(base64);
    }

await addDoc(
collection(db,"produtos"),
{
nome,
descricao,
categoria,
custo,
valor,
imagens,
tamanhos: parseTam(tamanhos)
}
);
    
// limpa campos
document.getElementById('foto').value='';
document.getElementById('nome').value='';
document.getElementById('descricao').value='';
document.getElementById('custo').value='';
document.getElementById('valor').value='';
document.getElementById('tamanhos').value='';
document.getElementById('categoria').value='';

await carregar();

alert('Produto adicionado!');

  }catch(e){

    console.error(e);
    alert(
      'Erro ao adicionar produto: ' +
      e.message
    );

  }
}
  
window.vender = async function(id,tamanho){

  let produto = produtos.find(p=>p.id === id);

  if(!produto) return;

  let t = produto.tamanhos[tamanho];

  if(t.vendido >= t.total){
    alert('Sem estoque');
    return;
  }

  const confirmar = confirm(
`Confirmar venda?

Produto: ${produto.nome}
Tamanho: ${tamanho}
Valor: R$ ${produto.valor}`
  );

  if(!confirmar) return;

  const formaPagamento = prompt(
`Forma de pagamento:

1 - PIX
2 - Dinheiro
3 - Cartão
4 - Parcelado`
  );

  let pagamento = 'Não informado';

  if(formaPagamento === '1'){
    pagamento = 'PIX';
  }

  if(formaPagamento === '2'){
    pagamento = 'Dinheiro';
  }

  if(formaPagamento === '3'){
    pagamento = 'Cartão';
  }

  if(formaPagamento === '4'){
    pagamento = 'Parcelado';
  }

  // baixa estoque
  t.vendido++;

  // calcula lucro real
  const lucroVenda =
  produto.valor - produto.custo;

  // cria histórico se não existir
  if(!produto.vendidos){
    produto.vendidos = [];
  }

  produto.vendidos.push({
    data: new Date().toLocaleString('pt-BR'),
    tamanho,
    valor: produto.valor,
    custo: produto.custo,
    lucro: lucroVenda,
    pagamento
  });

  produto.totalVendido =
  (produto.totalVendido || 0)
  + produto.valor;

  produto.lucro =
  (produto.lucro || 0)
  + lucroVenda;

  await updateDoc(
    doc(db,"produtos",id),
    {
      tamanhos: produto.tamanhos,
      vendidos: produto.vendidos,
      totalVendido:
      produto.totalVendido,
      lucro: produto.lucro
    }
  );

  alert(
`Venda confirmada!

Pagamento: ${pagamento}
Lucro: R$ ${lucroVenda.toFixed(2)}`
  );

  carregar();
}

window.excluirProduto = async function(id){

  if(confirm('Deseja excluir?')){

    await deleteDoc(doc(db,"produtos",id));

    carregar();
  }
}

window.editarProduto = async function(id){

  let produto = produtos.find(p => p.id === id);

  if(!produto) return;

  let novoNome =
  prompt('Novo nome', produto.nome);

  let novoValor =
  prompt('Novo valor', produto.valor);

  let tamanhosTexto = '';

  for(let t in produto.tamanhos){

    const dados = produto.tamanhos[t];

    tamanhosTexto +=
    `${t}:${dados.total},`;

  }

  tamanhosTexto =
  tamanhosTexto.slice(0,-1);

  let novosTamanhos =
  prompt(
    'Tamanhos (P:5,M:3,G:2)',
    tamanhosTexto
  );

  if(!novoNome || !novoValor || !novosTamanhos)
    return;

  let tamanhosAtualizados = {};

  novosTamanhos.split(',').forEach(item=>{

    let [tam,qtd] = item.split(':');

    let vendidoAnterior =
    produto.tamanhos[tam]?.vendido || 0;

    let reservadoAnterior =
    produto.tamanhos[tam]?.reservado || 0;

    tamanhosAtualizados[tam.trim()] = {
      total:Number(qtd),
      vendido:vendidoAnterior,
      reservado:reservadoAnterior
    };

  });

  await updateDoc(
    doc(db,'produtos',id),
    {
      nome: novoNome,
      valor: Number(novoValor),
      tamanhos: tamanhosAtualizados
    }
  );

  alert('Produto atualizado!');

  carregar();

}
  
let fotoAtual = {};

window.trocarFoto = function(id,direcao){

  const produto = produtos.find(p=>p.id === id);

  if(!produto) return;

  const imagens =
produto.imagens?.length
? produto.imagens
: (produto.img
? [produto.img]
: []);

  if(fotoAtual[id] == null){
    fotoAtual[id] = 0;
  }

  fotoAtual[id] += direcao;

  if(fotoAtual[id] < 0){
    fotoAtual[id] = imagens.length - 1;
  }

  if(fotoAtual[id] >= imagens.length){
    fotoAtual[id] = 0;
  }

  document.getElementById(`foto-${id}`).src =
  imagens[fotoAtual[id]];
}
  

function formatarMoeda(valor){
  return valor.toLocaleString('pt-BR', {
    style: 'currency',
    currency: 'BRL'
  });
}

function renderResumoFinanceiro(){

  let investimentoTotal = 0;
  let estoqueTotal = 0;
  let vendidoTotal = 0;
  let investimentoVendido = 0;

  produtos.forEach(produto=>{

    const custo = Number(produto.custo || 0);
    const valor = Number(produto.valor || 0);

    if(!produto.tamanhos) return;

    for(let t in produto.tamanhos){

      const dados = produto.tamanhos[t];

      const total = Number(dados.total || 0);
      const vendido = Number(dados.vendido || 0);
      const reservado = Number(dados.reservado || 0);

      const restante = Math.max(
        0,
        total - vendido - reservado
      );

      investimentoTotal += custo * total;
      estoqueTotal += valor * restante;
      vendidoTotal += valor * vendido;
      investimentoVendido += custo * vendido;
    }
  });

  const lucroTotal = vendidoTotal - investimentoVendido;

  document.getElementById('totalInvestimento').innerText =
  formatarMoeda(investimentoTotal);

  document.getElementById('totalEstoque').innerText =
  formatarMoeda(estoqueTotal);

  document.getElementById('totalVendido').innerText =
  formatarMoeda(vendidoTotal);

  document.getElementById('totalLucro').innerText =
  formatarMoeda(lucroTotal);
}
  
function renderHistoricoVendas(){

  const lista =
  document.getElementById('listaHistorico');

  if(!lista) return;

  let vendas = [];

  produtos.forEach(produto=>{

    if(!produto.vendidos || !Array.isArray(produto.vendidos)) return;

    produto.vendidos.forEach((venda,index)=>{

      vendas.push({
        produtoId: produto.id,
        produtoNome: produto.nome,
        index,
        ...venda
      });

    });

  });

  vendas.reverse();

  if(vendas.length === 0){
    lista.innerHTML = `
    <div class="venda-vazio">
      Nenhuma venda registrada ainda.
    </div>`;
    return;
  }

  lista.innerHTML = '';

  vendas.forEach(venda=>{

    const valor = Number(venda.valor || 0);
    const custo = Number(venda.custo || 0);
    const lucro = Number(
      venda.lucro != null
      ? venda.lucro
      : valor - custo
    );

    lista.innerHTML += `
    <div class="venda-card">
      <b>${venda.produtoNome}</b>
      <p><strong>Tamanho:</strong> ${venda.tamanho || '-'}</p>
      <p><strong>Venda:</strong> ${formatarMoeda(valor)}</p>
      <p><strong>Custo:</strong> ${formatarMoeda(custo)}</p>
      <p><strong>Lucro:</strong> <span class="venda-lucro">${formatarMoeda(lucro)}</span></p>
      <p><strong>Pagamento:</strong> ${venda.pagamento || 'Não informado'}</p>
      <p><strong>Data:</strong> ${venda.data || '-'}</p>
    </div>`;

  });

}
  
function render(){

renderResumoFinanceiro();
renderHistoricoVendas();

const lista =
document.getElementById('listaProdutos');

lista.innerHTML = '';

produtos.forEach(produto=>{

let htmlTam = '';

if(!produto.tamanhos) return;

for(let t in produto.tamanhos){

let dados =
produto.tamanhos[t];

let restante = Math.max(
0,
(dados.total || 0) -
(dados.vendido || 0) -
(dados.reservado || 0)
);

htmlTam += `
<div class="tamanho">
<span>${t}: ${restante} restantes</span>

<button class="btn-vender"
onclick="vender('${produto.id}','${t}')">
+
</button>
</div>`;
}

lista.innerHTML += `
<div class="card">

<div class="fotos-container">

<img id="foto-${produto.id}"
class="produto-img"
src="${
produto.imagens?.[0]
|| produto.img
|| 'https://via.placeholder.com/300x300?text=Sem+Imagem'
}">

${
(produto.imagens?.length || 0) > 1
? `
<button class="foto-btn foto-prev"
onclick="trocarFoto('${produto.id}',-1)">❮</button>

<button class="foto-btn foto-next"
onclick="trocarFoto('${produto.id}',1)">❯</button>
`
: ''
}

</div>

<div class="info">

<div class="nome">${produto.nome}</div>
<div class="preco">R$ ${produto.valor}</div>

${htmlTam}

<div class="botoes">

<button class="edit"
onclick="reporEstoque('${produto.id}')">
Repor Estoque
</button>

<button
style="background:#8b5cf6;color:white;"
onclick="gerenciarMidia('${produto.id}')">
Mídia
</button>

<button class="delete"
onclick="excluirProduto('${produto.id}')">
Excluir
</button>

</div>

</div>
</div>`;
});

}

  }

      manutencao: !ativo
    }
  );

  alert(
    !ativo
    ? '🚧 Modo manutenção ativado'

}

  verificarLogin();

  window.alternarAviso = async function(){

  const ref = doc(db,'config','site');

  const snap = await getDoc(ref);

  let ativo = false;

  if(snap.exists()){
    ativo = snap.data().mostrarAviso || false;
  }

  await setDoc(
    ref,
    {
      mostrarAviso: !ativo
    },
    { merge:true }
  );

  alert(
    !ativo
    ? '⚠️ Aviso ativado'
    : '✅ Aviso desativado'
  );

}

  window.reporEstoque = async function(id){

  const produto =
  produtos.find(p => p.id === id);

  if(!produto) return;

  const tamanho =
  prompt('Qual tamanho deseja adicionar? Ex: P, M, G, GG');

  if(!tamanho) return;

  const tam =
  tamanho.trim().toUpperCase();

  const quantidade =
  Number(prompt(`Quantas unidades deseja adicionar no tamanho ${tam}?`));

  if(!quantidade || quantidade <= 0){
    alert('Quantidade inválida');
    return;
  }

  if(!produto.tamanhos[tam]){

    produto.tamanhos[tam] = {
      total: 0,
      vendido: 0,
      reservado: 0
    };

  }

  produto.tamanhos[tam].total =
  (produto.tamanhos[tam].total || 0) + quantidade;

  await updateDoc(
    doc(db,'produtos',id),
    {
      tamanhos: produto.tamanhos
    }
  );

  alert('Estoque atualizado!');

  carregar();

}

window.adicionarMidia = async function(id){

  const produto =
  produtos.find(p => p.id === id);

  if(!produto) return;

  const tipo =
  prompt('O que deseja adicionar?\n\n1 - Foto\n2 - Vídeo');

  if(tipo === '1'){

    const input =
    document.createElement('input');

    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;

    input.onchange = async function(){

      const files = input.files;

      if(!files || files.length === 0) return;

      let novasImagens = [];

      for(let file of files){

        if(file.size > 800000){
          alert('Imagem muito pesada. Máximo 800KB por foto');
          return;
        }

        const base64 =
        await new Promise((resolve,reject)=>{

          const reader = new FileReader();

          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;

          reader.readAsDataURL(file);

        });

        novasImagens.push(base64);
      }

      produto.imagens = [
        ...(produto.imagens || []),
        ...novasImagens
      ];

      await updateDoc(
        doc(db,'produtos',id),
        {
          imagens: produto.imagens
        }
      );

      alert('Foto(s) adicionada(s)!');

      carregar();

    };

    input.click();

    return;
  }

  alert('Opção inválida');

}

  window.gerenciarMidia = async function(id){

  const produto =
  produtos.find(p => p.id === id);

  if(!produto) return;

  const opcao =
  prompt(
`GERENCIAR FOTOS

1 - Adicionar fotos
2 - Excluir uma foto`
  );

  if(opcao === '1'){

    const input =
    document.createElement('input');

    input.type = 'file';
    input.accept = 'image/*';
    input.multiple = true;

    input.onchange = async function(){

      const files = input.files;

      if(!files || files.length === 0) return;

      let novasImagens = [];

      for(let file of files){

        if(file.size > 800000){
          alert('Imagem muito pesada. Máximo 800KB por foto');
          return;
        }

        const base64 =
        await new Promise((resolve,reject)=>{

          const reader =
          new FileReader();

          reader.onload = () =>
          resolve(reader.result);

          reader.onerror = reject;

          reader.readAsDataURL(file);

        });

        novasImagens.push(base64);
      }

      produto.imagens = [
        ...(produto.imagens || []),
        ...novasImagens
      ];

      await updateDoc(
        doc(db,'produtos',id),
        {
          imagens: produto.imagens
        }
      );

      alert('Foto(s) adicionada(s)!');

      carregar();

    };

    input.click();

    return;
  }

  if(opcao === '2'){

    const imagens =
    produto.imagens || [];

    if(imagens.length === 0){
      alert('Esse produto não tem fotos para excluir.');
      return;
    }

    let lista = '';

    imagens.forEach((img,index)=>{
      lista += `${index + 1} - Foto ${index + 1}\n`;
    });

    const escolha =
    Number(
      prompt(
`Qual foto deseja excluir?

${lista}`
      )
    );

    if(!escolha || escolha < 1 || escolha > imagens.length){
      alert('Opção inválida');
      return;
    }

    if(!confirm(`Excluir a Foto ${escolha}?`))
      return;

    imagens.splice(escolha - 1, 1);

    await updateDoc(
      doc(db,'produtos',id),
      {
        imagens
      }
    );

    alert('Foto excluída!');

    carregar();

    return;
  }

}
  
</script>
